<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blind-Project DEMO Mobile Navigation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Inter', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            color: #4CAF50;
        }
        p {
            font-size: 16px;
            color: #b0b0b0;
            margin: 0 20px 20px;
        }
        #video-container {
            position: relative;
            width: 90vw;
            max-width: 400px;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            border: 2px solid #4CAF50;
        }
        video {
            width: 100%;
            height: auto;
            display: block;
        }
        .status-bar {
            margin-top: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-weight: 500;
        }
        button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <h1>Campus Navigation (DEMO)</h1>
    <p>Using Gemini API. Point your camera forward.</p>
    
    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <div class="status-bar" id="status">Ready to Start</div>
    <button id="start-btn">Start Navigation</button>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const status = document.getElementById('status');

        let isRunning = false;
        let lastSpokenAlert = "";
        let alertTimeout = null;

        // Configuration
        const API_URL = 'http://localhost:8001/analyze'; // Demo runs on 8001
        const FPS = 8; // ~125ms interval
        const INTERVAL_MS = 1000 / FPS;

        startBtn.addEventListener('click', async () => {
            if (isRunning) {
                stopApp();
            } else {
                await startApp();
            }
        });

        async function startApp() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
                isRunning = true;
                startBtn.innerText = "Stop Navigation";
                status.innerText = "Connecting to Demo Server...";
                
                // Initialize speech synthesis
                const utterance = new SpeechSynthesisUtterance("క్యాంపస్ నావిగేషన్ డెమో ప్రారంభించబడింది");
                utterance.lang = 'te-IN';
                window.speechSynthesis.speak(utterance);

                video.addEventListener('loadeddata', () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    captureLoop();
                });
            } catch (err) {
                console.error("Camera error:", err);
                status.innerText = "Camera access denied.";
            }
        }

        function stopApp() {
            isRunning = false;
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
            startBtn.innerText = "Start Navigation";
            status.innerText = "Stopped";
            window.speechSynthesis.cancel();
        }

        async function captureLoop() {
            if (!isRunning) return;

            const startTime = Date.now();
            
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const base64Image = canvas.toDataURL('image/jpeg', 0.6);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Image })
                });

                if (response.ok) {
                    const data = await response.json();
                    status.innerText = "Processing live stream...";
                    handleResponse(data);
                } else {
                    status.innerText = "Server Error";
                }
            } catch (err) {
                console.error("Fetch error:", err);
                status.innerText = "Connection lost. Retrying...";
            }

            const elapsed = Date.now() - startTime;
            const delay = Math.max(0, INTERVAL_MS - elapsed);
            setTimeout(captureLoop, delay);
        }

        function handleResponse(data) {
            if (data.alerts && data.alerts.length > 0) {
                const newAlert = data.alerts[0];
                if (newAlert !== lastSpokenAlert) {
                    speak(newAlert, true);
                    lastSpokenAlert = newAlert;
                    if (alertTimeout) clearTimeout(alertTimeout);
                    alertTimeout = setTimeout(() => { lastSpokenAlert = ""; }, 3000);
                }
                return;
            }

            if (data.caption && data.caption.trim().length > 0 && data.caption !== "మార్గం స్పష్టంగా ఉంది. అడ్డంకులు లేవు.") {
                if (!window.speechSynthesis.speaking) {
                    speak(data.caption, false);
                }
            }
        }

        function speak(text, isAlert) {
            if (isAlert) {
                window.speechSynthesis.cancel();
            }

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'te-IN';
            if (isAlert) {
                utterance.rate = 1.2;
                utterance.pitch = 1.1;
            }
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
